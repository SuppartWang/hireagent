services:
  postgres:
    image: postgres:16-alpine
    container_name: hireagent-postgres
    environment:
      POSTGRES_DB: hireagent
      POSTGRES_USER: hireagent
      POSTGRES_PASSWORD: hireagent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
